name: 功能建议
description: 新功能 / 改进建议
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## 功能建议
        欢迎提出任何想法！本项目尚不完善，欢迎 PR 一起完善。
  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 描述当前有哪些不便或缺失
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 描述你想要的实现方式
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 是否考虑过其他实现方式？
    validations:
      required: false
