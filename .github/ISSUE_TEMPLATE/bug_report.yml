name: 问题反馈
description: 报告 Bug 或数据异常
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## 请先确认
        - 是否已搜索过已有的 Issue，确保没有被重复提交
        - 是否是 GameTools API 本身的问题（可先访问 [api.gametools.network](https://api.gametools.network) 验证）
  - type: input
    id: player_name
    attributes:
      label: 涉及玩家名称
      placeholder: 例如 wangiii1i1
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 尽量详细描述你遇到的问题
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 xxx 页面
        2. 搜索 xxx
        3. 点击 xxx
        4. 观察到 xxx
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望看到什么？
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: 截图（可选）
      description: 拖拽图片到此处
    validations:
      required: false
